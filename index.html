<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>

<style>
body {
    margin: 0;
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* KHUNG */
.controller {
    width: 420px;
    background: linear-gradient(145deg, #caff4a, #9be000);
    border-radius: 50px;
    padding: 20px;
}

/* TOP */
.top {
    display: flex;
    justify-content: space-between;
}

/* NÚT */
.btn {
    width: 70px;
    height: 70px;
    background: #222;
    color: white;
    border: none;
    border-radius: 18px;
    font-size: 20px;
    font-weight: bold;
}

/* ACTIVE */
.btn.active {
    background: #00e5ff;
}

/* TRÁI */
.left {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

/* D-PAD */
.dpad {
    display: grid;
    grid-template-columns: repeat(3, 70px);
    grid-template-rows: repeat(3, 70px);
    gap: 10px;
}

/* DƯỚI */
.bottom {
    margin-top: 15px;
    display: flex;
    justify-content: center;
    gap: 15px;
}

.small-btn {
    width: 100px;
    height: 45px;
    border-radius: 15px;
    border: none;
    background: #222;
    color: white;
    font-weight: bold;
}

.small-btn.active {
    background: #00e5ff;
}
</style>
</head>

<body>

<div class="controller">

    <div class="top">

        <!-- TIẾN LÙI -->
        <div class="left">
            <button id="up" class="btn">↑</button>
            <button id="down" class="btn">↓</button>
        </div>

        <!-- D-PAD -->
        <div class="dpad">
            <div></div>
            <button id="lift_up" class="btn">⬆</button>
            <div></div>

            <button id="left" class="btn">←</button>
            <div></div>
            <button id="right" class="btn">→</button>

            <div></div>
            <button id="lift_down" class="btn">⬇</button>
            <div></div>
        </div>

    </div>

    <!-- AUTO -->
    <div class="bottom">
        <button id="auto" class="small-btn">AUTO</button>
        <button id="manual" class="small-btn">MANUAL</button>
    </div>

</div>

<script>
// ===== DOM =====
const up = document.getElementById('up');
const down = document.getElementById('down');
const left = document.getElementById('left');
const right = document.getElementById('right');
const lift_up = document.getElementById('lift_up');
const lift_down = document.getElementById('lift_down');
const autoBtn = document.getElementById('auto');
const manualBtn = document.getElementById('manual');

// ===== ERA =====
let actions = [];

const eraWidget = new EraWidget();

eraWidget.init({
    needActions: true,
    maxActionsCount: 6,

    onConfiguration:(config)=>{
        actions = config.actions;
    }
});

// ===== MOVE =====
function sendMove(speed, angle){
    if(actions[0]){
eraWidget.triggerAction(actions[0].action,{speed,angle});
    }
}

// ===== LIFT =====
function sendLift(val){
    if(actions[3]){
        eraWidget.triggerAction(actions[3].action,val);
    }
}

// ===== HOLD =====
function hold(btn, down, up){
    btn.onmousedown = ()=>{
        btn.classList.add("active");
        down();
    };

    btn.onmouseup = ()=>{
        btn.classList.remove("active");
        up();
    };

    btn.ontouchstart = (e)=>{
        e.preventDefault();
        btn.classList.add("active");
        down();
    };

    btn.ontouchend = ()=>{
        btn.classList.remove("active");
        up();
    };
}

// ===== GÁN =====
hold(up, ()=>sendMove(200,0), ()=>sendMove(0,0));
hold(down, ()=>sendMove(200,180), ()=>sendMove(0,0));
hold(left, ()=>sendMove(200,270), ()=>sendMove(0,0));
hold(right, ()=>sendMove(200,90), ()=>sendMove(0,0));

hold(lift_up, ()=>sendLift(1), ()=>sendLift(0));
hold(lift_down, ()=>sendLift(-1), ()=>sendLift(0));

// MODE
autoBtn.onclick = ()=>{
    autoBtn.classList.add("active");
    manualBtn.classList.remove("active");
    if(actions[1]) eraWidget.triggerAction(actions[1].action,1);
};

manualBtn.onclick = ()=>{
    manualBtn.classList.add("active");
    autoBtn.classList.remove("active");
    if(actions[2]) eraWidget.triggerAction(actions[2].action,0);
};

</script>

</body>
</html>
