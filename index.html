<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Robot Controller</title>
    <script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
    <style>
        :root {
            --primary-bg: #0a0a0a;
            --controller-gradient: linear-gradient(145deg, #caff4a, #9be000);
            --btn-bg: #222;
            --btn-active: #00e5ff;
            --text-white: #ffffff;
        }

        body {
            margin: 0;
            background: var(--primary-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .controller {
            width: 90%;
            max-width: 450px;
            background: var(--controller-gradient);
            border-radius: 40px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            user-select: none;
        }

        .top-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .movement-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .btn {
            width: 70px;
            height: 70px;
            background: var(--btn-bg);
            color: var(--text-white);
            border: none;
            border-radius: 20px;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            box-shadow: 0 4px 0px #000;
        }

        .btn:active, .btn.active {
            background: var(--btn-active);
            transform: translateY(4px);
            box-shadow: none;
            color: #000;
        }

        .mode-section {
            display: flex;
            justify-content: center;
            gap: 20px;
            border-top: 2px solid rgba(0,0,0,0.1);
            padding-top: 20px;
        }

        .small-btn {
            flex: 1;
            height: 50px;
            border-radius: 15px;
            border: none;
            background: var(--btn-bg);
            color: white;
            font-weight: 800;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .small-btn.active {
            background: var(--btn-active);
            color: #000;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
        }

        .empty { width: 70px; height: 70px; }

        /* Trạng thái kết nối */
        #status-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff4444;
            border: 2px solid #fff;
            transition: background 0.3s;
        }
        #status-indicator.online { background: #44ff44; }
    </style>
</head>
<body>

<div id="status-indicator"></div>

<div class="controller">
    <div class="top-section">
        <div class="movement-grid">
            <button id="up" class="btn">↑</button>
            <button id="down" class="btn">↓</button>
        </div>

        <div class="dpad">
            <div class="empty"></div>
            <button id="lift_up" class="btn">▲</button>
            <div class="empty"></div>

            <button id="left" class="btn">←</button>
            <div class="empty"></div>
            <button id="right" class="btn">→</button>

            <div class="empty"></div>
            <button id="lift_down" class="btn">▼</button>
            <div class="empty"></div>
        </div>
    </div>

    <div class="mode-section">
        <button id="auto" class="small-btn">AUTO</button>
        <button id="manual" class="small-btn active">MANUAL</button>
    </div>
</div>

<script>
    const eraWidget = new EraWidget();
    let configActions = [];
    const statusEl = document.getElementById('status-indicator');

    /**
     * Sửa lỗi "Invalid eraOrigin": 
     * EraWidget SDK kiểm tra nguồn gốc (origin) để đảm bảo bảo mật. 
     * Trong một số môi trường preview hoặc Dashboard, origin có thể bị chặn hoặc sai lệch.
     * Chúng ta sử dụng window.origin hoặc fallback về domain chính thức của Era.
     */
    const currentOrigin = window.origin || window.location.origin;
    const validatedOrigin = (currentOrigin === 'null' || !currentOrigin) ? '*' : currentOrigin;

    eraWidget.init({
        eraOrigin: validatedOrigin, 
        needActions: true,
        maxActionsCount: 6,
        
        // Sự kiện nhận cấu hình từ Dashboard
        onConfiguration: (config) => {
            configActions = config.actions;
            console.log("Era Configuration Loaded:", config);
        },

        // Sự kiện nhận giá trị thực tế từ phần cứng
        onValues: (values) => {
            console.log("Received values from Robot:", values);
        },

        // Sự kiện thay đổi trạng thái kết nối
        onConnect: () => {
            statusEl.classList.add('online');
            console.log("Robot Connected");
        },

        onDisconnect: () => {
            statusEl.classList.remove('online');
            console.log("Robot Disconnected");
        },

        // Sự kiện khi người dùng thay đổi thiết lập trong Dashboard
        onActionUpdated: (action) => {
            console.log("Action updated:", action);
        }
    });

    // Helper gửi lệnh điều khiển
    const triggerAction = (index, value) => {
        if (configActions && configActions[index]) {
            eraWidget.triggerAction(configActions[index].action, value);
        }
    };

    const sendMove = (speed, angle) => triggerAction(0, { speed, angle });
    const sendLift = (val) => triggerAction(3, val);

    // Xử lý giữ nút
    function setupHoldButton(id, onStart, onEnd) {
        const btn = document.getElementById(id);
        if (!btn) return;
        
        const start = (e) => {
            if (e.cancelable) e.preventDefault();
            btn.classList.add("active");
            onStart();
        };

        const stop = () => {
            if (btn.classList.contains("active")) {
                btn.classList.remove("active");
                onEnd();
            }
        };

        btn.onmousedown = start;
        window.addEventListener('mouseup', stop);
        btn.ontouchstart = start;
        btn.ontouchend = stop;
        btn.ontouchcancel = stop;
    }

    setupHoldButton('up', () => sendMove(200, 0), () => sendMove(0, 0));
    setupHoldButton('down', () => sendMove(200, 180), () => sendMove(0, 0));
    setupHoldButton('left', () => sendMove(200, 270), () => sendMove(0, 0));
    setupHoldButton('right', () => sendMove(200, 90), () => sendMove(0, 0));
    setupHoldButton('lift_up', () => sendLift(1), () => sendLift(0));
    setupHoldButton('lift_down', () => sendLift(-1), () => sendLift(0));

    const autoBtn = document.getElementById('auto');
    const manualBtn = document.getElementById('manual');

    autoBtn.onclick = () => {
        autoBtn.classList.add("active");
        manualBtn.classList.remove("active");
        triggerAction(1, 1);
    };

    manualBtn.onclick = () => {
        manualBtn.classList.add("active");
        autoBtn.classList.remove("active");
        triggerAction(2, 0);
    };

</script>
</body>
</html>
